name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write   # needed to cut the GitHub Release
  id-token: write   # mints the OIDC token npm trades for publish rights

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Node 24 bundles npm 11, ready for trusted publishing once this package
      # exists. Do NOT `npm install -g npm@latest`: it leaves npm's own tree
      # short of `sigstore`, and `--provenance` then dies on it.
      - name: Show npm version
        run: npm --version

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci
      - run: npm run build

      # npm cannot mint the first version of a package over OIDC: the trusted
      # publisher setting only appears once the package exists (npm/cli#8544).
      # This ships v0.3.0 with a token; switch to OIDC (drop NODE_AUTH_TOKEN)
      # once the trusted publisher is configured on npmjs.com.
      - name: Publish to npm (dry-run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --access public --provenance --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ inputs.dry_run != true }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
