name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write   # needed to cut the GitHub Release
  id-token: write   # mints the OIDC token npm trades for publish rights

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Node 24 bundles npm 11, ready for trusted publishing once this package
      # exists. Do NOT `npm install -g npm@latest`: it leaves npm's own tree
      # short of `sigstore`, and `--provenance` then dies on it.
      - name: Show npm version
        run: npm --version

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci
      - run: npm run build

      # No NODE_AUTH_TOKEN: npm authenticates via the OIDC token, and the
      # trusted publisher is configured on npmjs.com against this repo+workflow.
      # v0.3.0 had to ship with a token because npm cannot mint a package's
      # first version over OIDC (npm/cli#8544).
      - name: Publish to npm (dry-run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --access public --provenance --dry-run

      - name: Publish to npm
        if: ${{ inputs.dry_run != true }}
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true }}
        # Idempotent: when the release is cut from the GitHub UI (which creates the
        # tag AND the release), the tag push still triggers this workflow, and a
        # plain `gh release create` then 422s with "already exists". Skip if it's
        # already there so publishing over a UI-made release no longer fails.
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — skipping creation."
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
