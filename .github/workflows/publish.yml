name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write   # needed to cut the GitHub Release
  id-token: write   # mints the OIDC token npm trades for publish rights

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1; Node 22 still ships npm 10.
      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci
      - run: npm run build

      # No NODE_AUTH_TOKEN: npm authenticates via the OIDC token, and the
      # trusted publisher is configured on npmjs.com against this repo+workflow.
      - name: Publish to npm (dry-run)
        if: ${{ inputs.dry_run == true }}
        run: npm publish --access public --provenance --dry-run

      - name: Publish to npm
        if: ${{ inputs.dry_run != true }}
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
