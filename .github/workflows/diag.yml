name: Diagnose npm package state
on: { workflow_dispatch: }
permissions: { contents: read, id-token: write }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Inspect staged publishes
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "--- npm version ---"; npm --version
          echo "--- stage ls ---";    npm stage ls @upload-post/mcp || true
          echo "--- stage list ---";  npm stage list || true
          echo "--- view again ---";  npm view @upload-post/mcp version || true
