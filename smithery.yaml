# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - uploadPostApiKey
    properties:
      uploadPostApiKey:
        type: string
        title: Upload-Post API Key
        description: Your Upload-Post API key. Get it at https://app.upload-post.com → API Keys.
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    config => ({ command: 'node', args: ['dist/index.js'], env: { UPLOAD_POST_API_KEY: config.uploadPostApiKey } })
  exampleConfig:
    uploadPostApiKey: up_xxxxxxxxxxxxxxxxxxxxxxxx
