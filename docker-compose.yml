# Optional compose file — useful for local testing of the container or as
# a template for any Docker Compose-based deployment. PaaS that build from
# the Dockerfile directly don't need this file at all.
#
# In HTTP mode (the only mode that makes sense in a container) the server is
# multi-tenant: each MCP client sends its own Upload-Post API key in the
# `Authorization` header, so there is NO API key configured here.
services:
  upload-post-mcp:
    build: .
    image: upload-post-mcp:local
    container_name: upload-post-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Optional: override base URL (staging / self-hosted Upload-Post).
      UPLOAD_POST_BASE_URL: "${UPLOAD_POST_BASE_URL:-}"
